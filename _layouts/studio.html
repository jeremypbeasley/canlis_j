{% include head.html %}

<div class="StudioContainer">

  <!-- INTRO -->
  <div class="StudioIntro flex align-center">
    <div class="row">
      <div class="column col-xs-12 col-md-4 col-md-offset-4 color-white Ω">
        <p class="Caption text-align-center mb2 mt10">/ {{ page.title }}</p>
        <p class="mb0 text-align-center">{{ page.desc }}</p>
      </div>
    </div>
  </div>

  <div class="StudioGrid">
    <!-- MUURI BEGIN -->
    <div class="grid">
      {% for item in page.items %}
        <div class="item">
          <div class="item-content">
            <!-- Safe zone, enter your custom markup -->
            <div class="">
              {% for photo in item.photos %}
              <div class="">
                <img src="{{ photo.url }}" width="600">
              </div>
              {% endfor %}
              <p class="color-white mt2 mb0">
                {{ item.title }}<br />
                <span class="op50 color-white">{{ item.desc }}</span>
              </p>
            </div>
            <!-- Safe zone ends -->
          </div>
        </div>
      {% endfor %}
    </div>
    <!-- MUURI END -->
  </div>

</div>



{% include footer.html %}
