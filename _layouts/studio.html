{% include head.html %}

<div class="StudioContainer">

  <!-- INTRO -->
  <div class="StudioIntro flex align-center">
    <div class="row">
      <div class="column col-xs-12 col-md-4 col-md-offset-4 color-white Ω">
        <p class="Caption text-align-center mb2 mt10">/ {{ page.title }}</p>
        <p class="mb0 text-align-center">{{ page.desc }}</p>
      </div>
    </div>
  </div>

  <!-- GRID -->
  <div class="StudioGrid color-white">
  {% for item in page.items %}
    <div class="mb4">
      <div class="mb1 Caption">{{ item.title }}</div>
      <p class="mt2 mb4">{{ item.desc }}</p>
      {% for photo in item.photos %}
      <div class="mb4">
        <img src="{{ photo.url }}" width="600">
      </div>
      {% endfor %}
    </div>
  {% endfor %}
  </div>

</div>
