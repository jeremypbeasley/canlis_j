<div class="StudioContainer">

  <!-- INTRO -->
  <div class="StudioIntro flex align-center">
    <div class="row">
      <div class="column col-xs-12 col-md-4 col-md-offset-4 color-white Ω">
        <p class="Caption text-align-center mb2 mt10">/ {{ page.title }}</p>
        <div class="mb0 text-align-center ">{{ page.desc | markdownify }}</div>
      </div>
    </div>
  </div>

  <div class="StudioGrid">
    <!-- MUURI BEGIN -->
    <div class="grid">
      {% assign visible_items = page.items | where: "is_visible", true %}

      {% for item in visible_items %}
        {% assign item_key = forloop.index0 %}

        <div class="item {% if item.is_featured %}item--large{% endif %}" data-lightbox-target="{{ item_key }}">
          <button class="item__button" type="button" onclick="openLightbox({{ item_key }})" aria-label="Open {{ item.title | escape }}">
            <div class="item__content">
              {% if item.is_slideshow == true %}
              <script type="text/javascript">
                console.log("YES SLIDESHOW");
              </script>
                <div class="splide js-item-splide" data-interval="{{ item.photo_duration | default: 4000 }}">
                  <div class="splide__track">
                    <ul class="splide__list">
                      {% for photo in item.photos %}
                        <li class="splide__slide">
                          <img class="item__img" src="{{ photo.url }}" alt="{{ item.title | escape }}">
                        </li>
                      {% endfor %}
                    </ul>
                  </div>
                </div>
              {% else %}
                {% assign first = item.photos | first %}
                <script type="text/javascript">
                  console.log("NO SLIDESHOW");
                </script>
                <img class="item__img" src="{{ first.url }}" alt="{{ item.title | escape }}">
              {% endif %}

              <div class="item__overlay">
                <p class="item__desc color-white mb0 pb0">
                {% if item.desc %}
                  {{ item.desc}}
                {% endif %}</p>
              </div>
            </div>
            <div class="item-label flex justify-content-space-between">
              <div class="item-label__main color-white mb0 mt0 pb0">
                {{ item.title }}<br />
                {% if item.partner %}
                  <span class="op50">in collaboration with {{ item.partner }}</span>
                {% endif %}
              </div>

              {% if item.is_collection == true %}
                <div>
                  <span class="Caption color-white op50">See more</span>
                </div>
              {% else %}
                {% if item.is_soldout %}
                  <div>
                    <span class="Caption color-white op50">Sold Out</span>
                  </div>
                {% endif %}
              {% endif %}
            </div>
          </button>
        </div>
      {% endfor %}
    </div>
    <!-- MUURI END -->
  </div>

</div>

{% include footer.html %}
